<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Trekta - Hoja de Personaje</title>
  <style>
    body {
      margin: 0;
      background: #1a1008;
      display: flex;
      justify-content: center;
    }

    .sheet-wrapper {
      position: relative;
      width: 1131px;
      height: 1600px;
    }

    .sheet-bg {
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>
  <div class="sheet-wrapper">
    <img class="sheet-bg" src="https://github.com/juarkuro/Trekta_Sheet/blob/main/WhatsApp%20Image%202026-04-25%20at%2010.26.27%20PM.jpeg?raw=true" alt="Trekta">
    <input type="text" placeholder="" style="position:absolute; left:108px; top:285px; width:580px; height:30px; background:transparent; border:none; outline:none; font-size:22px; font-family:serif; color:#2a0e00;">
    <input type="text" style="position:absolute; left:108px; top:345px; width:185px; height:32px; background:transparent; border:none; outline:none; font-size:25px; font-family:serif; color:#2a0e00;">
    <textarea style="position:absolute; left:108px; top:1335px; width:393px; height:150px; background:transparent; border:none; outline:none; font-size:18px; font-family:serif; color:#2a0e00; resize:none;"></textarea>
<div style="position:absolute; left:665px; top:742px; width:420px; height:635px; overflow-y:auto;">
  <input id="equip-input" type="text" placeholder="Agregar item..." onkeydown="agregarEquipo(event)" style="width:100%; background:rgba(255,245,220,0.3); border:none; border-bottom:1px solid #8b5e2a; outline:none; font-size:14px; font-family:serif; color:#2a0e00; padding:4px;">
  <ul id="equip-lista" style="list-style:disc; padding-left:20px; margin-top:8px; font-family:serif; font-size:14px; color:#2a0e00;"></ul>
</div>

<script>
function agregarEquipo(e) {
  if (e.key === "Enter") {
    const input = document.getElementById("equip-input");
    const texto = input.value.trim();
    if (texto !== "") {
      const li = document.createElement("li");
      li.textContent = texto;
      document.getElementById("equip-lista").appendChild(li);
      input.value = "";
    }
  }
}
</script>
  </div>
</body>
</html>
