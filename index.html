<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Trekta - Hoja de Personaje</title>
  <style>
    body {
      margin: 0;
      background: #1a1008;
      display: flex;
      justify-content: center;
    }

    .sheet-wrapper {
      position: relative;
      width: 1131px;
      height: 1600px;
    }

    .sheet-bg {
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>
  <div class="sheet-wrapper">
    <img class="sheet-bg" src="https://github.com/juarkuro/Trekta_Sheet/blob/main/WhatsApp%20Image%202026-04-25%20at%2010.26.27%20PM.jpeg?raw=true" alt="Trekta">
    <input type="text" placeholder="" style="position:absolute; left:108px; top:285px; width:460px; height:33px; background:transparent; border:none; outline:none; font-size:24px; font-family:serif; color:#2a0e00;">
    <input type="text" style="position:absolute; left:108px; top:345px; width:155px; height:32px; background:transparent; border:none; outline:none; font-size:25px; font-family:serif; color:#2a0e00;">
    <textarea style="position:absolute; left:108px; top:1335px; width:393px; height:150px; background:transparent; border:none; outline:none; font-size:18px; font-family:serif; color:#2a0e00; resize:none;"></textarea>
<div style="position:absolute; left:660px; top:662px; width:360px; height:815px; overflow-y:auto;overflow-x:hidden;">
  <input id="equip-input" type="text" placeholder="Agregar item..." onkeydown="agregarEquipo(event)" style="width:100%; background:rgba(255,245,220,0.3); border:none; border-bottom:1px solid #8b5e2a; outline:none; font-size:16px; font-family:serif; color:#2a0e00; padding:4px;">
  <ul id="equip-lista" style="list-style:none; padding-left:10px; margin-top:8px; font-family:serif; font-size:14px; color:#2a0e00;"></ul>
</div>

<script>
function agregarEquipo(e) {
  if (e.key === "Enter") {
    const input = document.getElementById("equip-input");
    const texto = input.value.trim();
    if (texto !== "") {
      const li = document.createElement("li");
      /* NUEVO: estilo del item con botón al lado */
      li.style.cssText = "display:flex; justify-content:space-between; align-items:center; margin-bottom:4px;";
      /* NUEVO: el texto del item */
      const span = document.createElement("span");
      span.textContent = "• " + texto;
      span.style.cssText = "overflow-wrap:break-word; word-break:break-word; max-width:90%; display:inline-block;";
      /* NUEVO: botón de borrar */
      const btn = document.createElement("button");
      btn.textContent = "✕";
      btn.style.cssText = "background:none; border:none; color:#8b3a0a; cursor:pointer; font-size:12px; padding:0 4px;";
      btn.onclick = () => li.remove(); /* NUEVO: al hacer clic borra el item */
      li.appendChild(span);
      li.appendChild(btn);
      document.getElementById("equip-lista").appendChild(li);
      input.value = "";
    }
  }
}
</script>
    <select style="position:absolute; left:260px; top:1210px; width:130px; height:42px; background:transparent; border:none; outline:none; font-size:30px; font-family:serif; color:#2a0e00; cursor:pointer;">
  <option value="0">0</option>
  <option value="1">1</option>
  <option value="2">2</option>
  <option value="3">3</option>
  <option value="4">4</option>
  <option value="5">5</option>
  <option value="6">6</option>
</select>
    <script>
function crearDots(startX, y, cantidad, espaciado = 23, tamaño = 16) {
  for (let i = 0; i < cantidad; i++) {
    const x = startX + i * espaciado;
    const wrap = document.createElement("div");
    wrap.style.cssText = `position:absolute; left:${x - tamaño/2}px; top:${y - tamaño/2}px; width:${tamaño}px; height:${tamaño}px;`;
    const cb = document.createElement("input");
    cb.type = "checkbox";
    cb.style.cssText = `position:absolute; width:${tamaño}px; height:${tamaño}px; opacity:0; cursor:pointer; margin:0;`;
    const label = document.createElement("label");
    label.style.cssText = `position:absolute; width:${tamaño}px; height:${tamaño}px; border-radius:50%; cursor:pointer; transition:background 0.15s;border:2px solid rgba(65,28,6,0.5);`;
    cb.addEventListener("change", () => {
      label.style.background = cb.checked ? "rgba(65,28,6,0.85)" : "transparent";
    });
    wrap.appendChild(cb);
    wrap.appendChild(label);
    document.querySelector(".sheet-wrapper").appendChild(wrap);
  }
}

// FUERZA
crearDots(204, 532, 5);
</script>
  </div>
</body>
</html>
